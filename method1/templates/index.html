<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Dual Iris Analyzer (Custom Detection)</title>
    <style>
        body { background: #1a1a1a; color: #ddd; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1600px; margin: auto; }
        .controls { background: #333; padding: 20px; border-radius: 8px; display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; align-items: flex-end; }
        .file-group { flex: 1; min-width: 180px; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; white-space: nowrap; }
        .btn:hover { background: #0056b3; }
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .eye-column { background: #222; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        h2 { border-bottom: 2px solid #555; padding-bottom: 10px; color: #fff; margin-top: 0; }
        img { max-width: 100%; border: 1px solid #555; margin-top: 8px; display: none; border-radius: 4px; }
        .label { font-weight: bold; color: #aaa; margin-top: 15px; display: block; font-size: 13px; }
        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-top: 12px; flex-wrap: wrap; }
        .tab-btn {
            padding: 6px 14px; background: #444; color: #ccc; border: none; cursor: pointer;
            border-radius: 4px 4px 0 0; font-size: 13px; transition: background 0.15s;
        }
        .tab-btn:hover { background: #555; }
        .tab-btn.active { background: #007bff; color: #fff; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        @media (max-width: 900px) {
            .results-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Iridology AI Mapper</h1>
        
        <div class="controls">
            <div class="file-group">
                <label>ДЯСНО ОКО (Right):</label>
                <input type="file" id="fileR" accept="image/*">
            </div>
            <div class="file-group">
                <label>ЛЯВО ОКО (Left):</label>
                <input type="file" id="fileL" accept="image/*">
            </div>
            <button class="btn" onclick="analyze()">АНАЛИЗИРАЙ</button>
        </div>

        <div id="status" style="margin-bottom: 10px; color: yellow; min-height: 20px;"></div>

        <div class="results-grid">
            <div class="eye-column" id="colR" style="display:none">
                <h2>RIGHT EYE</h2>
                <span class="label">Детекция (Overlay):</span>
                <img id="ovlR" alt="Десен ирис – overlay с разпознати окръжности">
                <span class="label">Разгъвка на ириса (минута × пръстен):</span>
                <div class="tabs" role="tablist">
                    <button class="tab-btn active" role="tab" aria-selected="true"  aria-controls="tabR-base"      id="btnR-base"      onclick="switchTab('R','base',this)">Базов</button>
                    <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="tabR-structure" id="btnR-structure" onclick="switchTab('R','structure',this)">Структурен</button>
                    <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="tabR-pigment"   id="btnR-pigment"   onclick="switchTab('R','pigment',this)">Пигментен</button>
                </div>
                <div id="tabR-base"      class="tab-panel active" role="tabpanel" aria-labelledby="btnR-base">     <img id="mapR-base"      alt="Десен ирис – базов слой (осветление)"></div>
                <div id="tabR-structure" class="tab-panel"        role="tabpanel" aria-labelledby="btnR-structure"><img id="mapR-structure" alt="Десен ирис – структурен слой (крипти / влакна)"></div>
                <div id="tabR-pigment"   class="tab-panel"        role="tabpanel" aria-labelledby="btnR-pigment">  <img id="mapR-pigment"   alt="Десен ирис – пигментен слой (токсини / цвят)"></div>
            </div>
            <div class="eye-column" id="colL" style="display:none">
                <h2>LEFT EYE</h2>
                <span class="label">Детекция (Overlay):</span>
                <img id="ovlL" alt="Ляв ирис – overlay с разпознати окръжности">
                <span class="label">Разгъвка на ириса (минута × пръстен):</span>
                <div class="tabs" role="tablist">
                    <button class="tab-btn active" role="tab" aria-selected="true"  aria-controls="tabL-base"      id="btnL-base"      onclick="switchTab('L','base',this)">Базов</button>
                    <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="tabL-structure" id="btnL-structure" onclick="switchTab('L','structure',this)">Структурен</button>
                    <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="tabL-pigment"   id="btnL-pigment"   onclick="switchTab('L','pigment',this)">Пигментен</button>
                </div>
                <div id="tabL-base"      class="tab-panel active" role="tabpanel" aria-labelledby="btnL-base">     <img id="mapL-base"      alt="Ляв ирис – базов слой (осветление)"></div>
                <div id="tabL-structure" class="tab-panel"        role="tabpanel" aria-labelledby="btnL-structure"><img id="mapL-structure" alt="Ляв ирис – структурен слой (крипти / влакна)"></div>
                <div id="tabL-pigment"   class="tab-panel"        role="tabpanel" aria-labelledby="btnL-pigment">  <img id="mapL-pigment"   alt="Ляв ирис – пигментен слой (токсини / цвят)"></div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(side, layer, btn) {
            ['base','structure','pigment'].forEach(l => {
                const panel = document.getElementById('tab' + side + '-' + l);
                const tabBtn = document.getElementById('btn' + side + '-' + l);
                panel.classList.remove('active');
                if (tabBtn) { tabBtn.classList.remove('active'); tabBtn.setAttribute('aria-selected','false'); }
            });
            document.getElementById('tab' + side + '-' + layer).classList.add('active');
            btn.classList.add('active');
            btn.setAttribute('aria-selected', 'true');
        }

        function showImage(id) {
            const el = document.getElementById(id);
            if (el) el.style.display = 'block';
        }

        async function analyze() {
            const fR = document.getElementById('fileR').files[0];
            const fL = document.getElementById('fileL').files[0];
            
            if (!fR && !fL) {
                alert("Моля изберете поне една снимка!");
                return;
            }

            const fd = new FormData();
            if (fR) fd.append('image_right', fR);
            if (fL) fd.append('image_left', fL);

            document.getElementById('status').innerText = "Обработка...";
            document.getElementById('colR').style.display = 'none';
            document.getElementById('colL').style.display = 'none';
            
            try {
                const res = await fetch('/process', { method: 'POST', body: fd });
                const data = await res.json();
                
                const show = (side, d) => {
                    if (d && d.found) {
                        const col = document.getElementById('col' + side);
                        col.style.display = 'block';

                        const ovl = document.getElementById('ovl' + side);
                        ovl.src = 'data:image/jpeg;base64,' + d.overlay;
                        showImage('ovl' + side);

                        ['base', 'structure', 'pigment'].forEach(layer => {
                            const el = document.getElementById('map' + side + '-' + layer);
                            el.src = 'data:image/jpeg;base64,' + (d['map_' + layer] || d.mapped || '');
                            showImage('map' + side + '-' + layer);
                        });
                    }
                };

                show('R', data.R);
                show('L', data.L);
                
                document.getElementById('status').innerText = "Готово.";
            } catch(e) {
                document.getElementById('status').innerText = "Грешка: " + e.message;
            }
        }
    </script>
</body>
</html>
